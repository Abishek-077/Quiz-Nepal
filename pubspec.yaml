name: quiz_battle_nepal
description: Android-first Nepal-focused quiz battle MVP with local questions and mock ads.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/data/questions/driving_license.json
    - lib/data/questions/traffic_signs.json
    - lib/data/questions/loksewa_gk.json
    - lib/data/questions/computer_basics.json
    - lib/data/questions/nepal_gk.json
